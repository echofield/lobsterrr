<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#120a0a" />
  <title>LOBSTER — Hybrid Pixel Studio</title>
  <style>
    :root {
      --charcoal: #120a0a;
      --amber: #e8a24b;
      --booth-red: #c0392b;
      --cognac: #8c5a3c;
      --ink: #ece2d4;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; background: var(--charcoal); color: var(--ink);
      font-family: 'Courier New', ui-monospace, monospace; overflow: hidden; }
    #stage { position: fixed; inset: 0; display: grid; place-items: center; }
    #game { image-rendering: pixelated; }
    #hud { position: fixed; left: 14px; bottom: 12px; font-size: 12px; letter-spacing: .04em;
      color: #9a8f80; line-height: 1.7; pointer-events: none; }
    #hud b { color: var(--amber); font-weight: 400; }
    #cam-btn { position: fixed; right: 14px; bottom: 12px; font: inherit; font-size: 12px;
      letter-spacing: .12em; text-transform: uppercase; color: var(--ink);
      background: rgba(232,162,75,.06); border: 1px solid rgba(232,162,75,.4);
      border-radius: 2px; padding: 9px 14px; cursor: pointer; }
    #cam-btn[data-on="true"] { background: rgba(192,57,43,.18); border-color: var(--booth-red); }
    #title { position: fixed; left: 14px; top: 12px; font-size: 13px; letter-spacing: .28em;
      text-transform: uppercase; color: var(--amber); }

    /* ── fullscreen VST view ── */
    #vst { position: fixed; inset: 0; z-index: 50; display: none;
      background: linear-gradient(rgba(18,10,8,.86), rgba(10,6,5,.95)), url('/panels/studio.jpg');
      background-size: cover; background-position: center;
      align-items: center; justify-content: center; }
    #vst.on { display: flex; }
    .vst-frame { width: min(880px, 92vw); background: rgba(20,14,12,.82);
      border: 1px solid rgba(232,162,75,.28); border-radius: 6px; padding: 22px 26px 18px;
      box-shadow: 0 30px 80px rgba(0,0,0,.6); backdrop-filter: blur(6px); }
    .vst-frame header { display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; }
    .vst-name { font-size: 16px; letter-spacing: .2em; text-transform: uppercase; color: var(--amber); }
    .vst-name span { color: #9a8f80; letter-spacing: .12em; }
    .vst-x { font: inherit; font-size: 12px; letter-spacing: .12em; text-transform: uppercase;
      color: var(--ink); background: rgba(232,162,75,.06); border: 1px solid rgba(232,162,75,.4);
      border-radius: 2px; padding: 8px 14px; cursor: pointer; }
    .vst-x:hover { background: rgba(232,162,75,.14); }
    .seq-row { display: flex; align-items: center; gap: 14px; margin: 10px 0; }
    .seq-label { width: 56px; font-size: 12px; letter-spacing: .14em; }
    .seq-steps { display: grid; grid-template-columns: repeat(16, 1fr); gap: 6px; flex: 1; }
    .seq-cell { aspect-ratio: 1; border-radius: 3px; cursor: pointer;
      background: rgba(236,231,218,.05); border: 1px solid rgba(236,231,218,.12); transition: background .08s; }
    .seq-cell.beat { border-color: rgba(236,231,218,.28); }
    .seq-cell.on { background: var(--accent); border-color: var(--accent);
      box-shadow: 0 0 10px -2px var(--accent); }
    .seq-cell.cur { outline: 2px solid var(--amber); outline-offset: 1px; }
    .vst-frame footer { margin-top: 18px; font-size: 11px; color: #7c7468; letter-spacing: .04em; }
    .vst-body.placeholder { text-align: center; padding: 40px 10px; color: var(--ink); }
    .vst-body.placeholder .dim { color: #9a8f80; font-size: 13px; margin-top: 8px; }
    .vst-body.placeholder b { color: var(--amber); }
  </style>
</head>
<body>
  <div id="title">LOBSTER · control room</div>
  <div id="stage"><div id="game"></div></div>
  <div id="hud">
    <b>click</b> an instrument to open it · keys <b>1</b> <b>2</b> <b>3</b> <b>4</b> toggle loops<br/>
    move <b>mouse</b> · filter <b>mouse Y</b> / <b>↑ ↓</b> · all in A minor
  </div>
  <button id="cam-btn" data-on="false">enable camera</button>
  <div id="vst"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
